# Constructor Studio artifacts registry

[[ignore]]
reason = "Internal test fixtures contain synthetic/broken cpt markers and IDs"
patterns = [
  "tests/test_codebase.py",
  "tests/test_cli_integration.py",
  "tests/test_cli_py_coverage.py",
]

[[ignore]]
reason = "Extracted to constructorfabric/studio-kit-sdlc per cpt-cypilot-adr-extract-sdlc-kit"
patterns = [
  "architecture/features/sdlc-kit.md",
  "architecture/features/pr-workflows.md",
]

[[ignore]]
reason = "Vendored third-party libraries (kept verbatim under upstream license); see assets/vendor/PROVENANCE.md"
patterns = [
  "skills/studio/scripts/studio/vendor/**",
  "skills/studio/scripts/studio/commands/map/__init__.py",
]

[[systems]]
name = "Constructor Studio"
slug = "studio"
kit = "sdlc"
children = []

[[systems.autodetect]]
kit = "sdlc"
system_root = "{project_root}"
artifacts_root = "architecture"

[systems.autodetect.artifacts.PRD]
pattern = "PRD.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.DESIGN]
pattern = "DESIGN.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.DECOMPOSITION]
pattern = "DECOMPOSITION.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.ADR]
pattern = "ADR/**/*.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.FEATURE]
pattern = "features/*.md"
traceability = "FULL"
required = false

[[systems.artifacts]]
name = "Execution Plans"
path = "architecture/features/execution-plans.md"
kind = "FEATURE"
traceability = "DOCS-ONLY"

[[systems.artifacts]]
name = "Ralphex Delegation"
path = "architecture/features/ralphex-delegation.md"
kind = "FEATURE"
traceability = "DOCS-ONLY"

[[systems.autodetect.codebase]]
name = "Studio Proxy"
path = "src/studio_proxy"
extensions = [".py"]
singleLineComments = ["#"]
multiLineComments = [{start = '"""', end = '"""'}]

[[systems.autodetect.codebase]]
name = "Studio CLI"
path = "skills/studio/scripts/studio"
extensions = [".py"]
singleLineComments = ["#"]
multiLineComments = [{start = '"""', end = '"""'}]

[[systems]]
name = "Examples"
slug = "ex"
kit = "sdlc"
artifacts_dir = "examples"
children = []

[[systems.autodetect]]
kit = "sdlc"
system_root = "{project_root}/examples/$system"
artifacts_root = "{system_root}/architecture"

[systems.autodetect.artifacts.PRD]
pattern = "PRD.md"
traceability = "FULL"

[systems.autodetect.artifacts.DESIGN]
pattern = "DESIGN.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.DECOMPOSITION]
pattern = "DECOMPOSITION.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.ADR]
pattern = "ADR/**/*.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.FEATURE]
pattern = "features/*.md"
traceability = "FULL"
required = false

[[systems.autodetect.codebase]]
name = "Overwork Alert"
path = "{system_root}/src"
extensions = [".py"]
singleLineComments = ["#"]
multiLineComments = [{start = '"""', end = '"""'}]