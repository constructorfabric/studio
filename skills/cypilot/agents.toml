# Cyber Constructor SDLC Kit — Subagent Definitions
#
# Declares agents that the `cf-constructor agents` command generates as
# tool-specific proxy files (Claude Code, Cursor, Copilot, OpenAI Codex).
#
# Semantic fields (mode, isolation, model) are mapped to per-tool
# frontmatter by the agents command — kits never need tool-specific knowledge.
#
# Field mappings by tool:
#
#   isolation (bool):
#     Claude Code  → true = worktree-isolated agent, false = main-context agent
#     Cursor       → true = "agent" mode (background), false = inline composer
#     Copilot      → true = separate workspace context, false = shared context
#     Codex        → true = sandboxed execution, false = shared session
#
#   model (string):
#     "inherit"    → all tools: use the model selected by the user/session
#     "fast"       → Claude Code: maps to "sonnet"; Cursor: maps to "claude-3.5-sonnet";
#                    Copilot/Codex: maps to the tool's fast-tier model
#     Prefer "inherit" unless the agent explicitly needs a cheaper/faster tier.
#     Use "fast" only for high-volume, low-complexity tasks (e.g. PR review).

[agents.cf-constructor-codegen]
description = """\
Cyber Constructor code generator. Use when requirements are fully specified and \
no clarification is needed. Takes a complete task description and \
implements it in an isolated context — no back-and-forth, just code."""
prompt_file = "agents/cf-constructor-codegen.md"
mode = "readwrite"
isolation = true
model = "cf:inherit"
role = "generate"
target = "codebase"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-constructor-pr-review]
description = """\
Cyber Constructor PR reviewer. Use to review pull requests with structured \
checklist-based analysis. Runs in a separate context so detailed \
review output stays isolated from the main conversation."""
prompt_file = "agents/cf-constructor-pr-review.md"
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-constructor-ralphex]
description = """\
Cyber Constructor ralphex delegation agent. Use when delegating a Cyber Constructor plan \
to ralphex for autonomous execution. Manages discovery, export, \
delegation, and handoff lifecycle."""
prompt_file = "agents/cf-constructor-ralphex.md"
mode = "readwrite"
isolation = false
model = "cf:inherit"
role = "any"
target = "any"
reasoning_effort = "medium"
context_window = "medium"

[agents.cf-constructor-phase-runner]
description = """\
Cyber Constructor execution-plan phase runner. Use when executing the next or a \
specific phase from a generated Cyber Constructor plan inside a dedicated agent \
context, without delegating to ralphex."""
prompt_file = "agents/cf-constructor-phase-runner.md"
mode = "readwrite"
isolation = true
model = "cf:inherit"
role = "generate"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-constructor-phase-compiler]
description = """\
Cyber Constructor execution-plan phase compiler. Use when compiling exactly one \
plan phase from its brief in an isolated agent context, without \
delegating to ralphex or executing the phase."""
prompt_file = "agents/cf-constructor-phase-compiler.md"
mode = "readwrite"
isolation = true
model = "cf:inherit"
role = "planning"
target = "artifacts"
reasoning_effort = "high"
context_window = "medium"

# ---------------------------------------------------------------------------
# Migrate-from-Cypilot sub-agent set
#
# Coordinated by `skills/cypilot/migrate-from-cypilot.md` (the orchestrator
# loaded by the workflow-routing keyword `migrate from cypilot`). The
# orchestrator dispatches each agent sequentially with explicit user-approval
# gates and a bounded migrator↔verifier loop.
#
# All four agents operate on the user's project IN-PLACE (isolation = false)
# so the migrator's edits are visible to the verifier and to subsequent
# orchestrator passes without requiring a commit between phases.
# ---------------------------------------------------------------------------

[agents.cf-constructor-migrate-scanner]
description = """\
Cyber Constructor migration scanner. Read-only sub-agent for post-deterministic \
cleanup: scans the project for residual cypilot/cpt/Cypilot/Cyber Pilot \
references the mechanical `cfc init --migrate-from-cypilot=yes` did not touch \
(source code, CI, docs, agent configs, workspaces, build files). Emits a \
structured findings list for the planner to categorize. Dispatched by the \
`migrate from cypilot` orchestrator after user approval."""
prompt_file = "agents/cf-constructor-migrate-scanner.md"
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "analyze"
target = "any"
reasoning_effort = "low"
context_window = "high"

[agents.cf-constructor-migrate-planner]
description = """\
Cyber Constructor migration planner. Read-only sub-agent that takes the \
scanner's findings and produces a migration plan grouped by execution category: \
A (auto-fixable string substitutions), B (needs-review context-sensitive), and \
C (cascade operations — workspace rename, member-repo cascade, agent-config \
regeneration). Emits a plan the orchestrator presents to the user for review \
BEFORE dispatching the migrator."""
prompt_file = "agents/cf-constructor-migrate-planner.md"
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "planning"
target = "any"
reasoning_effort = "high"
context_window = "medium"

[agents.cf-constructor-migrate-migrator]
description = """\
Cyber Constructor migration migrator. Write-capable sub-agent that applies a \
pre-approved migration plan to disk: category A substitutions mechanically, \
category B items via interactive walk, category C operations printed for \
manual execution. Returns a migration manifest of every change applied. \
Operates in-place (isolation = false) so its edits are visible to the verifier \
without requiring a commit."""
prompt_file = "agents/cf-constructor-migrate-migrator.md"
mode = "readwrite"
isolation = false
model = "cf:tier:cheap"
role = "generate"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-constructor-migrate-verifier]
description = """\
Cyber Constructor migration verifier. Read-only sub-agent that closes the \
migration loop: confirms the migrator's manifest landed correctly on disk, \
re-runs scanner patterns over the changed-files surface to catch regressions, \
and surfaces residue (regressed, missed-by-plan, or noticed-but-not-in-plan \
items) for the orchestrator to feed back into another migrator pass. Bounded \
by the orchestrator's 3-iteration cap."""
prompt_file = "agents/cf-constructor-migrate-verifier.md"
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "analyze"
target = "any"
reasoning_effort = "low"
context_window = "high"
