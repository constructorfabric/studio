# Constructor Studio SDLC Kit — Subagent Definitions
#
# Declares agents that the `cf agents` command generates as
# tool-specific proxy files (Claude Code, Cursor, Copilot, OpenAI Codex).
#
# Semantic fields (mode, isolation, model) are mapped to per-tool
# frontmatter by the agents command — kits never need tool-specific knowledge.
# Prompt source files are intentionally NOT registered here. For each
# `[agents.<id>]` entry, the CLI resolves orchestration guidance
# conventionally from `skills/studio/agents/<id>.md` and generates an empty
# host endpoint that points the orchestrator at that source file.
#
# Field mappings by tool:
#
#   isolation (bool):
#     Claude Code  → true = worktree-isolated agent, false = main-context agent
#     Cursor       → true = "agent" mode (background), false = inline composer
#     Copilot      → true = separate workspace context, false = shared context
#     Codex        → true = sandboxed execution, false = shared session
#
#   model (string):
#     "inherit"    → all tools: use the model selected by the user/session
#     "fast"       → legacy alias; prefer explicit `cf:tier:*` values below.
#     Avoid `inherit` / `cf:inherit` except for rare agents with a documented
#     local rationale, because inherit can silently upgrade routine sub-agent
#     work to the user's most expensive session model.
#
#   Supported `model` forms (resolver: scripts/studio/commands/agents.py:_resolve_model_id):
#     "cf:inherit"    → emit no `model:` line (tool uses session default);
#                       use only with an explicit local rationale because it can
#                       silently upgrade routine sub-agent work to the user's
#                       most expensive session model
#     "cf:auto"       → emit the tool's literal `auto` where supported; else inherit
#     "cf:tier:cheap" | "cf:tier:balanced" | "cf:tier:expensive"
#                     → resolved via (tool, provider) cell in _MODEL_MATRIX, with
#                       (tier, role, target) overrides applied per cell
#     "<raw_id>"      → passthrough verbatim (escape hatch for vendor literals
#                       when the matrix abstraction is insufficient); see
#                       `_resolve_model_id` passthrough branch
#
#   reasoning_effort (string):
#     Use "low" for execution agents that receive a resolved plan, phase brief,
#     approved manifest, or narrow contract. Raise to "medium" or "high" only
#     when the agent must decide what to do/how to do it, perform creative
#     prompt/artifact design, handle ambiguity, or run semantic review.
#
# Navigation — model-matrix anchor markers in scripts/studio/commands/agents.py:
#   inst-agents-datamodel            → Agent dataclass + field definitions
#   inst-agent-field-validators      → allowed-value sets for mode/role/target/tier/effort/context
#   inst-agent-model-aliases         → bare-name → `cf:tier:*` aliases (backward compat)
#   inst-tool-provider-tables        → per-tool supported-provider set + native default
#   inst-matrix-claude-anthropic     → (claude, anthropic) matrix cell
#   inst-matrix-codex-openai         → (codex, openai) matrix cell
#   inst-matrix-cursor-anthropic     → (cursor, anthropic) matrix cell
#   inst-matrix-cursor-openai        → (cursor, openai) matrix cell
#   inst-matrix-copilot-anthropic    → (copilot, anthropic) matrix cell
#   inst-matrix-copilot-openai       → (copilot, openai) matrix cell
#   inst-auto-value-map              → per-tool literal `auto` value (or None)
#   inst-resolve-model-id            → (tool, provider, tier, role, target) resolver
#   inst-codex-context-tokens        → Codex CLI context-window token caps
#   inst-codex-effort-map            → Codex CLI reasoning-effort name mapping
# All marker IDs use the qualified prefix
# `cpt-studio-algo-agent-integration-generate-shims:p1:`.

# Shared prompt guidance files intentionally excluded from agent registration:
#   - cf-generate-author-worker.md (loaded by the controller when synthesizing author-tier final prompts)
#   - author-production-rules.md (selected from SHARED_CONTEXT_PACK for the author-worker chain)
# These files are not dispatchable agents and have no agents.toml entry by design.

# codegen runs in isolation but dispatches nested cf-*
# sub-agents; the host supports nested dispatch from isolated
# contexts via the same approval session.
[agents.cf-codegen]
description = """\
Invoke when requirements are fully specified and code must be implemented in \
an isolated context without back-and-forth clarification — takes a complete \
task description and writes the code."""
mode = "readwrite"
isolation = true
model = "cf:tier:balanced"
role = "generate"
target = "codebase"
reasoning_effort = "low"
context_window = "high"

[agents.cf-pr-review]
description = """\
Invoke when reviewing a GitHub pull request with structured checklist-based \
analysis in a separate context — keeps detailed review output isolated from \
the main conversation."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-ralphex]
description = """\
Invoke when delegating a generated Constructor Studio plan to ralphex for \
autonomous execution — manages the discovery, export, delegation, and \
handoff lifecycle."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "any"
target = "any"
reasoning_effort = "medium"
context_window = "medium"

# Phase agents intentionally do NOT load SKILL.md (their parent plan supplies
# the contract). The default variants operate in-place because canonical plan
# state usually lives under gitignored `{cf-studio-path}/.plans/` in the main
# checkout. Use the `*-isolated` variants only when the plan manifest, briefs,
# phase files, and declared outputs are tracked or otherwise visible inside the
# worktree. The Phase-Skip Gate does not apply.
[agents.cf-phase-runner]
description = """\
Invoke when executing the next or a specific phase from a generated \
Constructor Studio plan in-place against main-checkout-local plan state, \
without delegating to ralphex."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "generate"
target = "any"
reasoning_effort = "low"
context_window = "high"

[agents.cf-phase-compiler]
description = """\
Invoke when compiling exactly one generated plan phase from its compilation \
brief in-place against main-checkout-local plan state, without delegating to \
ralphex or executing the phase."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "planning"
target = "artifacts"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-phase-runner-isolated]
prompt_file = "agents/cf-phase-runner.md"
description = """\
Invoke when executing the next or a specific phase from a generated \
Constructor Studio plan in a worktree-isolated agent context, only when \
plan.toml, briefs, phase files, and declared outputs are tracked or otherwise \
visible inside the worktree."""
mode = "readwrite"
isolation = true
model = "cf:tier:balanced"
role = "generate"
target = "any"
reasoning_effort = "low"
context_window = "high"

[agents.cf-phase-compiler-isolated]
prompt_file = "agents/cf-phase-compiler.md"
description = """\
Invoke when compiling exactly one generated plan phase from its compilation \
brief in a worktree-isolated agent context, only when the brief, output path, \
and plan manifest are tracked or otherwise visible inside the worktree."""
mode = "readwrite"
isolation = true
model = "cf:tier:balanced"
role = "planning"
target = "artifacts"
reasoning_effort = "low"
context_window = "medium"

# ---------------------------------------------------------------------------
# Migrate-from-Cypilot sub-agent set
#
# Coordinated by `{cf-studio-path}/.core/skills/studio/migrate-from-cypilot.md` (the orchestrator
# loaded by the workflow-routing keyword `migrate from cypilot`). The
# orchestrator dispatches each agent sequentially with explicit user-approval
# gates and a bounded migrator↔verifier loop.
#
# All four agents operate on the user's project IN-PLACE (isolation = false)
# so the migrator's edits are visible to the verifier and to subsequent
# orchestrator passes without requiring a commit between phases.
# ---------------------------------------------------------------------------

[agents.cf-migrate-scanner]
description = """\
Invoke when scanning a project for residual cypilot/cpt/Cypilot/Cyber Pilot \
references that the mechanical `cfs init --migrate-from-cypilot=yes` did not \
touch (source code, CI, docs, agent configs, workspaces, build files) — \
read-only post-deterministic cleanup; expects the controller to inject \
Constructor Studio mode and emits a structured findings list for the planner \
to categorize. Dispatched by the `migrate from cypilot` orchestrator \
after user approval."""
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "analyze"
# target = "codebase": the scanner reads project source files to detect
# residual cypilot/cpt/Cypilot/Cyber Pilot references. The matrix override
# (cheap, analyze, codebase) → sonnet upgrades this agent off Haiku for
# providers where Haiku struggles with code-reading recall.
target = "codebase"
reasoning_effort = "low"
context_window = "high"

[agents.cf-migrate-planner]
description = """\
Invoke when turning the migrate-scanner's findings into a categorized migration \
plan — read-only; groups items by execution category A (auto-fixable string \
substitutions), B (needs-review context-sensitive), and C (cascade operations: \
workspace rename only, member-repo cascade, agent-config regeneration). Emits a \
plan with resolved user-presentable Category C items for the orchestrator to \
present before dispatching the migrator."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "planning"
target = "any"
reasoning_effort = "high"
context_window = "medium"

[agents.cf-migrate-migrator]
description = """\
Invoke when applying a pre-approved migration plan to disk — write-capable: \
category A substitutions mechanically, category B items via interactive walk, \
category C operations printed for manual execution. Returns a migration manifest \
of every change applied. Operates in-place (isolation = false) so its edits are \
visible to the verifier without requiring a commit. Uses `cf_studio_path` as \
the managed-tree boundary input, must never modify `{cf_studio_path}/.core/`, \
and must preserve planner-approved Category C semantics without unresolved \
placeholders or silent downgrades."""
mode = "readwrite"
isolation = false
model = "cf:tier:cheap"
role = "generate"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-migrate-verifier]
description = """\
Invoke when re-running scanning after a migrator pass to close the migration \
loop — read-only; confirms the migrator's manifest landed correctly on disk, \
re-runs scanner patterns over the changed-files surface to catch regressions, \
and surfaces residue (regressed, missed-by-plan, or noticed-but-not-in-plan \
items) for the orchestrator to feed back into another migrator pass. Uses \
`cf_studio_path` as the managed-tree boundary input. Bounded by the \
orchestrator's 3-iteration cap."""
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "analyze"
# target = "codebase": verifier re-runs scanner patterns over the changed
# project files to detect residual cypilot references; same matrix-override rationale as cf-migrate-scanner.
target = "codebase"
reasoning_effort = "low"
context_window = "high"

# ---------------------------------------------------------------------------
# Thin-orchestrator sub-agent pool (shared by generate + analyze workflows)
#
# Defined by the thin-orchestrator dispatch contract (see
# {cf-studio-path}/.core/skills/studio/SKILL.md "Session Sub-Agent Approval Gate"
# and the SubAgentDispatch UNIT in {cf-studio-path}/.core/skills/studio/SKILL.md).
# The diff-scope resolver is analyze-only. The validator and semantic reviewers
# are reusable across analyze and generate's Phase 5 review loop; brainstorm
# agents drive generate's Phase 0.7 panel session; collector + planner + author
# drive generate's Phase 1 / Phase 1.5 / Phase 4 + review-loop fix passes.
#
# Most agents operate IN-PLACE (isolation = false) so dispatch results
# (manifests, validator output, findings) stay synchronized with disk state
# the orchestrator just observed. Brainstorm experts are context-isolated so
# native fan-out preserves the workflow's independence guarantee.
# ---------------------------------------------------------------------------

[agents.cf-diff-scope-resolver]
description = """\
Invoke when an analyze/review request targets a commit, branch, worktree, \
patch, or uncommitted changes — resolves the Git diff scope, changed files, \
omissions, and review targets while leaving `changed_hunks` empty in this \
structural-only mode, and only emits `risk_hotspots` when direct targets were \
explicitly named, so the orchestrator does not perform semantic diff scanning \
itself."""
mode = "readonly"
isolation = false
# Fast scope-resolution-only agent. Stays at haiku-tier (no matrix override
# upgrade) because it runs only `git --name-status` / `--stat` — no source
# reads, no semantic analysis. target=any keeps it off the cheap-analyze-
# codebase upgrade path.
model = "cf:tier:cheap"
role = "analyze"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-deterministic-validator]
description = """\
Invoke when running target-applicable validation commands through the resolved \
validator command for the target bootstrap (`validate`, `validate --artifact`, \
`validate-toc`, `check-language`) and returning the canonical Deterministic \
Gate block (per-command exit code, JSON status, error_count, warning_count, \
overall PASS/FAIL/SKIPPED with availability proof)."""
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "analyze"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-semantic-reviewer-artifact]
description = """\
Invoke when running the kit-checklist semantic review on an artifact target \
plus its cross-refs — expects the controller to inject the \
checklist/compliance instruction context, walks every category, and emits Findings (severity, \
mechanical, path, line, evidence_quote, root_cause, \
suggested_fix) against the artifact-mode semantic-review contract. Missing a \
contract-required checklist asset is fail-closed; only truly optional RELAXED \
reviews degrade to a limited sweep, never by reopening prompt files from disk."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "artifacts"
reasoning_effort = "high"
context_window = "high"

[agents.cf-semantic-reviewer-code]
description = """\
Invoke when running the code-checklist semantic review on code targets against \
a design artifact — expects the controller to inject the review methodology, \
walks every category, and emits Findings against the code-checklist review contract."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "codebase"
reasoning_effort = "high"
context_window = "high"

[agents.cf-code-bug-finder]
description = """\
Invoke when running the code bug-finding methodology on code targets — expects \
the controller to inject that methodology and emits Findings for correctness, logic, reliability, \
security, concurrency, performance, and integration defects."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "codebase"
reasoning_effort = "high"
context_window = "high"

[agents.cf-semantic-reviewer-prompt]
description = """\
Invoke when running the 10-layer prompt-engineering review on prompt / \
instruction targets (workflows, skills, agent prompts, AGENTS.md) — expects \
the controller to inject the prompt-engineering methodology and compliance \
assets in the final dispatch prompt, and emits \
Findings plus review_result/checkpoint discriminator outputs in the Prompt \
Review schema."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-prompt-bug-finder]
description = """\
Invoke when running the prompt-bug-finding methodology on prompt / instruction \
targets — expects the controller to inject that methodology and emits Findings for behavioral \
defects, routing bugs, unsafe defaults, hidden failure modes, and handoff \
breakage."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-pdsl-author]
description = """\
Invoke when cf-pdsl new mode must create a new prompt, workflow, skill, or \
agent instruction file as a compact PDSL contract using the shared-context-pack \
PDSL spec with explicit state, menus, \
UX prompts, stop points, authority boundaries, and completion gates."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "generate"
target = "any"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-pdsl-transformer]
description = """\
Invoke when cf-pdsl transform mode must convert existing prose prompt, \
workflow, skill, requirement, or agent instruction files into PDSL while \
preserving behavior, constraints, state transitions, menus, and handoffs."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "generate"
target = "any"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-pdsl-reviewer]
description = """\
Invoke when cf-pdsl review mode must inspect prompt, workflow, skill, \
requirement, or agent instruction files for PDSL correctness, compactness, \
state/menu/UX safety, hidden prose rules, missing STOP_TURN, and handoff bugs."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-semantic-reviewer-consistency]
description = """\
Invoke when cross-checking terminology, references, normative claims, and \
scope across ≥ 2 target documents — expects the controller to inject the \
consistency checklist and emits \
Findings against the consistency contract."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-semantic-reviewer-freeform]
description = """\
Invoke when running a freeform semantic review driven by a user-supplied \
custom prompt or question — no fixed checklist; applies the freeform_prompt \
criteria to the target paths and emits Findings in the Freeform Review \
output schema (Rf namespace)."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-brainstorm-facilitator]
description = """\
Invoke when opening a brainstorm session — one-shot per session. Given the \
initial topic plus rules.md / template / example / project context, proposes \
a 3-6-person expert panel (persona, focus, rationale) and a seed topic for \
round 1. Pure function: orchestrator collects user edits before the round \
loop starts."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "planning"
target = "any"
reasoning_effort = "medium"
context_window = "medium"

[agents.cf-brainstorm-expert]
description = """\
Invoke when contributing one expert's persona-scoped turn to a brainstorm \
round — parameterized by persona and mode (`topic` | `challenge`) passed in \
the dispatch prompt. Given {persona, topic, state, mode, challenged_decisions?}, \
returns either `{ relevant: false, reason }` (sit out) or `{ relevant: true, \
questions: [1..3], critique, next_topic_proposal }`. In `challenge` mode the \
expert pushes back on the supplied `challenged_decisions` from its persona's POV, \
emits challenge-mode `0..3` questions, allows a critique-only challenge, and \
sets `next_topic_proposal = null`; counter-proposals are emitted as the \
questions' `proposed_default`. Dispatched \
in parallel for the full panel per round."""
mode = "readonly"
isolation = true
model = "cf:tier:balanced"
role = "planning"
target = "any"
reasoning_effort = "medium"
context_window = "medium"

[agents.cf-brainstorm-panel]
description = """\
Invoke when running the single-agent panel-mode brainstorm round — \
dispatched once per round instead of per-expert fan-out. Owns serialized \
persona iteration (§4), per-iteration mirror writes (§6), anti-collapse \
guards G3-G5 (§8), envelope-emit contract with parse-time invariants \
(§9-§10), protocol branching (independent-then-critique, single-pass), \
and deterministic envelope rendering. Returns the `envelope` object the \
orchestrator flattens into `contributions[]`."""
mode = "readonly"
isolation = true
model = "cf:tier:balanced"
role = "planning"
target = "any"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-explorer]
description = """\
Invoke when a controller needs read-only discovery of task-relevant project \
resources before dispatching brainstorm, generate, analyze, or planning agents. \
Returns a resource_context map with relevant files, summaries, suggested slices, \
persona-specific needs, and missing-context questions."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-generate-collector]
description = """\
Invoke when parsing a template into per-section questions and proposing \
defaults to produce an Inputs block for the user — parses H2 sections, loads \
the example, and returns the rendered Inputs proposal block for the \
orchestrator to show. When pre_resolved_inputs is supplied (from brainstorm), \
pre-fills those sections marked [from brainstorm] and proposes only the \
remaining ones."""
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "planning"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-analyze-planner]
description = """\
Invoke when the analyze workflow needs a reviewer execution plan: decompose \
the analyze run into reviewer-sub-agent tasks partitioned by methodology and \
path-partition, identify dependencies, and mark which tasks can run in \
parallel. Read-only; disk-mode plan files are written by the orchestrator \
from the returned plan."""
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "planning"
target = "any"
reasoning_effort = "medium"
context_window = "medium"

[agents.cf-generate-planner]
description = """\
Invoke when generate inputs are approved and the workflow needs a lightweight \
author execution plan before Phase 3 summary: decompose work into author \
tasks, recommend author worker agents, identify dependencies, and mark which \
tasks can run in parallel. Read-only; disk-mode plan files are written by the \
orchestrator from the returned plan."""
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "planning"
target = "any"
reasoning_effort = "medium"
context_window = "medium"

[agents.cf-generate-author]
description = """\
Invoke when a generate author write/fix dispatch is needed to classify task \
domain and complexity, then select the cheapest capable author agent. Routes \
generic artifact/config work to junior/middle/senior/lead, code-only work to \
coder-casual/coder-smart, and prompt/workflow/agent instructions to \
prompt-engineer-casual/prompt-engineer-smart. The selector is read-only and \
does not write files."""
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "planning"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-generate-author-junior]
description = """\
Invoke when the generate-author selector chooses junior for simple, bounded \
create/fix tasks: one file, complete inputs, low-risk prose or mechanical \
edits, and no architectural/code/security ambiguity. Consumes the shared author \
execution prompt assets and returns a manifest."""
mode = "readwrite"
isolation = false
model = "cf:tier:cheap"
role = "generate"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-generate-author-middle]
description = """\
Invoke when the generate-author selector chooses middle for standard artifact \
or small code create/fix tasks with clear inputs, moderate cross-references, \
or small mechanical review-loop batches. Consumes the shared author execution prompt assets and \
returns a manifest."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "generate"
target = "any"
reasoning_effort = "low"
context_window = "high"

[agents.cf-generate-author-senior]
description = """\
Invoke when the generate-author selector chooses senior for complex artifacts, \
code changes, multi-file writes, strict-rule outputs, or non-mechanical fixes \
that require careful judgment. Consumes the shared author execution prompt assets and returns a \
manifest."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "generate"
target = "any"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-generate-author-lead]
description = """\
Invoke when the generate-author selector chooses lead for high-risk or broad \
generation/fix tasks: cross-system architecture, security/concurrency/data \
integrity concerns, workflow/agent prompt changes, large finding batches, or \
uncertain scope where cheaper tiers are likely to fail. Consumes the shared author \
execution prompt assets and returns a manifest."""
mode = "readwrite"
isolation = false
model = "cf:tier:expensive"
role = "generate"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-generate-coder-casual]
description = """\
Invoke when the generate-author selector chooses coder-casual for small, \
code-only create/fix tasks with complete inputs, at most two source/test files, \
no security/concurrency/data-model risk, and no prompt/artifact writing. Consumes \
the shared author execution prompt assets and returns a manifest."""
mode = "readwrite"
isolation = false
model = "cf:tier:cheap"
role = "generate"
target = "codebase"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-generate-coder-smart]
description = """\
Invoke when the generate-author selector chooses coder-smart for code-only \
tasks that need deeper implementation judgment: behavior changes, tests, \
refactors, API boundaries, or moderate security/concurrency/data implications, \
without prompt/workflow authoring. Consumes the shared author execution prompt assets and returns \
a manifest."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "generate"
target = "codebase"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-generate-prompt-engineer-casual]
description = """\
Invoke when the generate-author selector chooses prompt-engineer-casual for \
small prompt/workflow/agent wording or routing edits with local scope and no \
state-machine, handoff, or multi-file semantic redesign. Consumes the shared \
author execution prompt assets and returns a manifest."""
mode = "readwrite"
isolation = false
model = "cf:tier:cheap"
role = "generate"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-generate-prompt-engineer-smart]
description = """\
Invoke when the generate-author selector chooses prompt-engineer-smart for \
prompt/workflow/agent/skill changes that affect state, routing, handoffs, \
sub-agent contracts, validation criteria, or multi-file prompt semantics. Consumes \
the shared author execution prompt assets and returns a manifest."""
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "generate"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-storytelling-preflight]
prompt_file = "agents/storytelling-preflight.md"
description = """\
Invoke when the orchestrator enters storytelling phase E0 — canonicalize \
the input_ref, derive session_id, scan for prior session on disk under \
{cf-studio-path}/.cache/explain/sessions/, run cheap size guards, pick the \
input-access tier (local → MCP → skill → CLI → user-fallback), load \
preferences.json, and return the structured handle (target_type / \
file_count / primary_language / preferences_loaded / input_access_*)."""
mode = "readonly"
isolation = false
model = "cf:tier:cheap"
role = "planning"
target = "any"
reasoning_effort = "low"
context_window = "medium"

[agents.cf-storytelling-gate]
prompt_file = "agents/storytelling-gate.md"
description = """\
Invoke when the orchestrator enters any storytelling E1 or E5 gate \
(mode / artifact-disposition / audience / plan / context-pack-strategy / \
export-format) — generic two-phase agent: phase=render returns rendered_menu \
+ parse_table + suggested_default_n; phase=parse returns selected_tag + \
next_action. Plan-gate is the only gate authorized to emit chat (4-option \
Go/Edit/Pivot/Cancel approval menu); other gates return parsing artefacts \
the orchestrator emits."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "planning"
target = "any"
reasoning_effort = "medium"
context_window = "medium"

[agents.cf-storytelling-context-pack]
prompt_file = "agents/storytelling-context-pack.md"
description = """\
Invoke when the orchestrator enters storytelling phase E1.5.pack-build — \
read the whole input once and emit a content_pack JSON parameterized by \
strategy (snippets/anchors/hybrid). Returns anchors, plan_anchor_map, \
depth_mode_flags, overview, and total_extracted_bytes; portions in the \
inline E2 loop read from this pack instead of re-reading source."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "planning"
target = "any"
reasoning_effort = "medium"
context_window = "high"

[agents.cf-storytelling-wrap]
prompt_file = "agents/storytelling-wrap.md"
description = """\
Invoke when the orchestrator enters storytelling phase E5.wrap — synthesise \
the final summary (Key Takeaways with source refs as clickable markdown \
links, Open Questions, Glossary, Bookmarked Takeaways, Suggested Next \
Steps) from accumulated session state. Does NOT auto-fill open_questions \
or glossary — only user-driven entries are carried forward."""
mode = "readonly"
isolation = false
model = "cf:tier:balanced"
role = "analyze"
target = "any"
reasoning_effort = "medium"
context_window = "medium"

[agents.cf-storytelling-export]
prompt_file = "agents/storytelling-export.md"
description = """\
Invoke when the orchestrator enters storytelling phase E5.export-emit — \
emit the package on disk under {cf-studio-path}/.cache/explain/packages/\
<slug>-<timestamp>/ with index.md, per-portion files, Mermaid navigation \
graph, and mode-specific extras (review→comments.md, onboarding→\
next-steps-checklist.md, decision→decision-record.md). All artifact bodies \
use relative paths; refuses export for mode=socratic per AP-#34."""
mode = "readwrite"
isolation = false
model = "cf:tier:cheap"
role = "generate"
target = "any"
reasoning_effort = "low"
context_window = "medium"
