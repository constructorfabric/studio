prompt_file = "agents/cf-generate-author-lead.md"
mode = "readwrite"
isolation = false
model = "cf:tier:expensive"
role = "generate"
target = "any"
reasoning_effort = "high"
context_window = "high"

[agents.cf-generate-coder-casual]
description = """\
Invoke when the generate-author selector chooses coder-casual for small, \
code-only create/fix tasks with complete inputs, at most two source/test files, \
no security/concurrency/data-model risk, and no prompt/artifact writing. Uses \
