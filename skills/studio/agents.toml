prompt_file = "agents/cf-generate-coder-smart.md"
mode = "readwrite"
isolation = false
model = "cf:tier:balanced"
role = "generate"
target = "codebase"
reasoning_effort = "high"
context_window = "high"

[agents.cf-generate-prompt-engineer-casual]
description = """\
Invoke when the generate-author selector chooses prompt-engineer-casual for \
